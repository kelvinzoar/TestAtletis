# ------------------------------------------------------------------
# Ambiente de desenvolvimento completo: PHP-FPM + Nginx + MySQL.
# Subir tudo:   docker compose up -d --build
# Derrubar:     docker compose down          (add -v para apagar o banco)
# ------------------------------------------------------------------
services:
  # Banco de dados MySQL 8
  mysql:
    image: mysql:8.0
    container_name: despesas-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      # Expõe na 3307 do host para não conflitar com um MySQL local (3306)
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      # O PHP só deve tentar conectar quando o banco estiver realmente pronto
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Interpretador PHP (FastCGI) — roda a aplicação Yii2
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: despesas-php
    environment:
      YII_ENV: ${YII_ENV}
      YII_DEBUG: ${YII_DEBUG}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_TTL: ${JWT_TTL}
    volumes:
      # Código montado para hot-reload durante o desenvolvimento
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy

  # Servidor web — encaminha requisições PHP para o php-fpm
  nginx:
    image: nginx:1.27-alpine
    container_name: despesas-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  dbdata:
