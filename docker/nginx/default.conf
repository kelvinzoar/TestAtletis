# Configuração do Nginx para servir a API Yii2.
server {
    listen 80;
    server_name localhost;

    # A raiz pública é a pasta /web (onde fica o index.php).
    # Tudo fora de /web (código, config, .env) fica inacessível pela web — boa prática de segurança.
    root /var/www/web;
    index index.php;

    # Documentação interativa (Swagger UI) servida como arquivos estáticos.
    # Fica ANTES do location "/" para não cair no roteamento JSON do Yii.
    location /docs/ {
        index index.html;
        try_files $uri $uri/ =404;
    }

    # URLs "bonitas": qualquer rota que não seja um arquivo real cai no index.php,
    # onde o urlManager do Yii resolve a rota.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Encaminha a execução de PHP para o container php-fpm (porta 9000).
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
